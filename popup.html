<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词翻译</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    
    .header {
      background: linear-gradient(135deg, #07c160 0%, #05a050 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 16px;
    }
    
    .quick-translate {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .quick-translate h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #555;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    #inputText {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    #inputText:focus {
      border-color: #07c160;
    }
    
    #translateBtn {
      padding: 10px 20px;
      background: #07c160;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #translateBtn:hover {
      background: #06ad56;
    }
    
    #translateBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .result-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      min-height: 60px;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      word-wrap: break-word;
      border-left: 3px solid #07c160;
    }
    
    .result-box:empty::before {
      content: '翻译结果将显示在这里';
      color: #999;
    }
    
    .result-box.loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #07c160;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .features {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .features h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #555;
    }
    
    .feature-list {
      list-style: none;
    }
    
    .feature-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
      color: #666;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .feature-list li:last-child {
      border-bottom: none;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: rgba(7, 193, 96, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #07c160;
      font-size: 14px;
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
    
    .footer a {
      color: #07c160;
      text-decoration: none;
    }
    
    .lang-select {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .lang-select select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    
    .lang-select select:focus {
      outline: none;
      border-color: #07c160;
    }
    
    .lang-arrow {
      display: flex;
      align-items: center;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 划词翻译</h1>
    <p>免费 · 无限制 · 支持多语言</p>
  </div>
  
  <div class="content">
    <div class="quick-translate">
      <h3>快速翻译</h3>
      
      <div class="lang-select">
        <select id="sourceLang">
          <option value="auto">自动检测</option>
          <option value="zh">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
        <span class="lang-arrow">→</span>
        <select id="targetLang">
          <option value="zh" selected>中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
      
      <div class="input-group">
        <input type="text" id="inputText" placeholder="输入要翻译的文本...">
        <button id="translateBtn">翻译</button>
      </div>
      
      <div class="result-box" id="resultBox"></div>
    </div>
    
    <div class="features">
      <h3>功能特性</h3>
      <ul class="feature-list">
        <li>
          <span class="feature-icon">✓</span>
          <span>网页划词自动翻译</span>
        </li>
        <li>
          <span class="feature-icon">✓</span>
          <span>支持 20+ 种语言互译</span>
        </li>
        <li>
          <span class="feature-icon">✓</span>
          <span>完全免费，无使用限制</span>
        </li>
        <li>
          <span class="feature-icon">✓</span>
          <span>支持朗读发音</span>
        </li>
      </ul>
    </div>
  </div>
  
  <div class="footer">
    <a href="options.html" target="_blank">设置</a> · 
    <a href="https://github.com/yourusername/selection-translator" target="_blank">GitHub</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
